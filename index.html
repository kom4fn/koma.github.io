<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>koma</title>
  <meta name="description"" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.google.com/specimen/UnifrakturMaguntia?preview.script=Latn&query=d&categoryFilters=Appearance:%2FTheme%2FBlackletter" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg: #000000;
      --bg2: #0a0a0a;
      --panel: rgba(10, 10, 10, 0.92);
      --line: rgba(255, 255, 255, 0.18);
      --line-strong: rgba(255, 255, 255, 0.4);
      --text: #f2f2f2;
      --muted: #9a9a9a;
      --accent: #ffffff;
      --accent-soft: rgba(255, 255, 255, 0.06);
      --shadow: 0 0 48px rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: 'JetBrains Mono', monospace;
      background: transparent;
      color: var(--text);
      overflow-x: hidden;
    }

    #bgVideo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: grayscale(1) brightness(0.45) contrast(1.15);
      pointer-events: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(
          circle at center,
          rgba(0, 0, 0, 0.18) 0%,
          rgba(0, 0, 0, 0.55) 50%,
          rgba(0, 0, 0, 0.85) 100%
        ),
        linear-gradient(
          rgba(0, 0, 0, 0.45),
          rgba(0, 0, 0, 0.55)
        );
      pointer-events: none;
      z-index: -2;
      animation: breathe 8s ease-in-out infinite;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      opacity: 0.06;
      pointer-events: none;
      background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.35) 0 1px, transparent 1px);
      background-size: 12px 12px;
      mix-blend-mode: soft-light;
      z-index: -1;
    }

    .scanline {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.018) 50%, transparent 100%);
      background-size: 100% 6px;
      opacity: 0.28;
      pointer-events: none;
      animation: scanMove 14s linear infinite;
    }

    @keyframes scanMove {
      from { transform: translateY(0); }
      to { transform: translateY(6px); }
    }


    @keyframes breathe {
        0% {
          opacity: 0.9;
        }
        50% {
          opacity: 0.75;
        }
        100% {
          opacity: 0.9;
        }
      }

    #particles {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 36px 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: min(560px, 100%);
      background: rgba(10, 10, 10, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 0 48px rgba(255, 255, 255, 0.12);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent 34%, transparent 70%, rgba(255,255,255,0.05));
      pointer-events: none;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.95rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.8s ease-out 0.1s both;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent);
      flex: 0 0 auto;
    }

    .profile-head {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-top: 26px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.8s ease-out 0.2s both;
    }

    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.42);
      box-shadow: 0 0 28px rgba(255, 255, 255, 0.16);
      background: rgba(255,255,255,0.03);
      flex: 0 0 auto;
      animation: avatarPulse 3.8s ease-in-out infinite;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .avatar:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 34px rgba(255, 255, 255, 0.25);
    }

    @keyframes avatarPulse {
      0%, 100% {
        box-shadow: 0 0 24px rgba(255, 255, 255, 0.12);
      }
      50% {
        box-shadow: 0 0 34px rgba(255, 255, 255, 0.24);
      }
    }

    .profile-info {
      min-width: 0;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      color: var(--accent);
      text-shadow: 0 0 22px rgba(255,255,255,0.2);
      position: relative;
      z-index: 1;
      animation: glitchIn 1.1s ease-out both;
    }

    @keyframes glitchIn {
      0% {
        opacity: 0;
        transform: translateY(8px);
        text-shadow: -3px 0 rgba(255,255,255,0.10), 3px 0 rgba(255,255,255,0.25);
      }
      20% {
        opacity: 1;
        text-shadow: 3px 0 rgba(255,255,255,0.06), -3px 0 rgba(255,255,255,0.22);
      }
      40% {
        text-shadow: -2px 0 rgba(255,255,255,0.04), 2px 0 rgba(255,255,255,0.15);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
        text-shadow: 0 0 22px rgba(255,255,255,0.2);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .divider {
      height: 1px;
      margin: 28px 0 20px;
      background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
      position: relative;
      z-index: 1;
      animation: fadeUp 0.8s ease-out 0.6s both;
    }

    .bottom {
      margin-top: 36px;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.8s ease-out 0.78s both;
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px 12px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,0.02);
      transition: 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .social-link:hover {
      transform: translateY(-3px);
      border-color: var(--line-strong);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 10px 24px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .social-link i {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      font-size: 1.05rem;
      color: var(--text);
      transition: 0.25s ease;
      flex: 0 0 auto;
    }

    .social-link:hover i {
      background: var(--accent);
      color: #000;
      transform: scale(1.06);
    }

    .social-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      line-height: 1.3;
    }

    .social-text strong {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .social-text span {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .right-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .music-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.01);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.22s ease;
    }

    .music-btn:hover {
      border-color: var(--line-strong);
      background: rgba(255,255,255,0.05);
    }

    .music-btn.playing {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.10) inset, 0 0 22px rgba(255,255,255,0.08);
    }

    .music-btn.playing i {
      animation: pulseIcon 1.2s ease-in-out infinite;
    }

    @keyframes pulseIcon {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    @media (max-width: 820px) {
      .profile-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .avatar {
        width: 92px;
        height: 92px;
      }

      .card {
        padding: 24px;
        border-radius: 18px;
      }

      .bottom {
        flex-direction: column;
        align-items: stretch;
      }

      .socials {
        width: 100%;
        flex-direction: column;
      }

      .social-link {
        width: 100%;
        justify-content: flex-start;
      }

      .socials, .right-actions {
        width: 100%;
      }

      .music-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline id="bgVideo">
    <source src="bg.mp4" type="video/mp4">
  </video>

  <div class="scanline"></div>

  <main class="wrap">
    <section class="card">
      <canvas id="particles"></canvas>

      <div class="eyebrow"><span class="dot"></span> Malware Analysis</div>

      <div class="profile-head">
        <img id="discordAvatar" class="avatar" src="avatar-fallback.png" alt="Discord avatar">
        <div class="profile-info">
          <h1>koma</h1>
        </div>
      </div>

      <div class="divider"></div>

      <div class="bottom">
        <div class="socials">
          <a class="social-link" href="https://discord.gg/Gt2Z8cMV5N" target="_blank" rel="noreferrer">
            <i class="fa-brands fa-discord"></i>
            <span class="social-text">
              <strong>Discord</strong>
              <span>Nyx</span>
            </span>
          </a>
        </div>

        <div class="right-actions">
          <button class="music-btn" id="toggleMusic" type="button">
            <i class="fa-solid fa-wave-square"></i>
            <span id="musicText">Play track</span>
          </button>
        </div>
      </div>

      <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mpeg">
      </audio>
    </section>
  </main>

  <script>
    const audio = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('toggleMusic');
    const musicText = document.getElementById('musicText');
    let playing = false;
    let startedOnce = false;

    function syncMusicButton() {
      if (playing) {
        musicBtn.classList.add('playing');
        musicText.textContent = 'Pause track';
      } else {
        musicBtn.classList.remove('playing');
        musicText.textContent = 'Play track';
      }
    }

    function startMusic() {
      if (startedOnce) return;
      audio.play().then(() => {
        playing = true;
        startedOnce = true;
        syncMusicButton();
      }).catch(() => {
        musicText.textContent = 'Audio blocked';
      });
    }

    document.addEventListener('click', startMusic, { once: true });

    musicBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      try {
        if (!playing) {
          await audio.play();
          playing = true;
          startedOnce = true;
        } else {
          audio.pause();
          playing = false;
        }
        syncMusicButton();
      } catch (err) {
        musicText.textContent = 'Audio blocked';
      }
    });

    fetch('https://api.lanyard.rest/v1/users/1233935833195872347')
      .then(res => res.json())
      .then(data => {
        const user = data?.data?.discord_user;
        if (!user || !user.avatar) return;
        const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
        const avatarUrl = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=256`;
        document.getElementById('discordAvatar').src = avatarUrl;
      })
      .catch(() => {});

    (function initParticles() {
      const canvas = document.getElementById('particles');
      const card = document.querySelector('.card');
      const ctx = canvas.getContext('2d');
      let width, height, particles;
      const PARTICLE_COUNT = 90;
      const MAX_DIST = 140;

      function resize() {
        width = canvas.width = card.clientWidth;
        height = canvas.height = card.clientHeight;
      }

      function createParticles() {
        particles = Array.from({ length: PARTICLE_COUNT }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 0.9,
          vy: (Math.random() - 0.5) * 0.9,
          r: Math.random() * 1.6 + 0.6,
          o: Math.random() * 0.5 + 0.25
        }));
      }

      function step() {
        ctx.clearRect(0, 0, width, height);

        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 0) p.x = width;
          if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height;
          if (p.y > height) p.y = 0;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.o})`;
          ctx.fill();
        }

        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const a = particles[i];
            const b = particles[j];
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < MAX_DIST) {
              const alpha = (1 - dist / MAX_DIST) * 0.15;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(step);
      }

      resize();
      createParticles();
      requestAnimationFrame(step);

      window.addEventListener('resize', () => {
        resize();
        createParticles();
      });
    })();
  </script>
</body>
</html>
